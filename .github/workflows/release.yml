name: Build and Release uar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Build project
        run: cargo build --release

      - name: Package binary on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item target/release/uar.exe dist/
          Compress-Archive -Path dist/uar.exe -DestinationPath dist/uar-windows.zip

      - name: Package binary on macOS
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir dist
          cp target/release/uar dist/
          cd dist
          tar czf uar-macos.tar.gz uar

      - name: Package binary on Linux
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir dist
          cp target/release/uar dist/
          cd dist
          tar czf uar-linux.tar.gz uar

      - name: Upload binary to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
