name: Build and Release uar

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: linux.tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: windows.zip
          - os: macos-13
            target: x86_64-apple-darwin
            ext: macos-x86_64.tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            ext: macos-arm64.tar.gz

    runs-on: ${{ matrix.os }}
    name: Build on ${{ matrix.os }} (${{ matrix.target }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build project
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          mkdir dist
          Copy-Item target/${{ matrix.target }}/release/uar.exe dist/
          Compress-Archive -Path dist/uar.exe -DestinationPath dist/uar-${{ matrix.ext }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/uar dist/
          cd dist
          tar czf uar-${{ matrix.ext }} uar

      - name: Upload binary to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          files: |
            dist/uar-*.zip
            dist/uar-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
